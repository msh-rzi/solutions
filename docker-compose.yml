x-service-defaults: &service-defaults
  init: true
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  portfolio:
    <<: *service-defaults
    mem_limit: ${PORTFOLIO_MEM_LIMIT:-450m}
    cpus: "${PORTFOLIO_CPUS:-0.60}"
    build:
      context: .
      dockerfile: apps/_3-Portfolio/Dockerfile
    env_file:
      - apps/_3-Portfolio/.env
    ports:
      - "3010:3010"
    environment:
      PORT_PORTFOLIO: "3010"
      APP_LINK_PROTOCOL: "http"
      APP_LINK_HOST: "localhost"
      PORT_FIELD_LEVEL_PERMISSION_FILTERS: "3011"
      PORT_DATA_GRID: "3012"
      PORT_DASHBOARD: "3013"
      PORT_ACID_TRANSACTION_SYSTEM: "3020"
      PORT_QUERY_OPTIMIZATION: "3021"
  field-level-permission-filters:
    <<: *service-defaults
    mem_limit: ${FLP_MEM_LIMIT:-320m}
    cpus: "${FLP_CPUS:-0.45}"
    build:
      context: .
      dockerfile: apps/_2-Frontend/field-level-permission-filters/Dockerfile
    env_file:
      - apps/_2-Frontend/field-level-permission-filters/.env
    ports:
      - "3011:3011"
    environment:
      PORT_FIELD_LEVEL_PERMISSION_FILTERS: "3011"

  data-grid:
    <<: *service-defaults
    mem_limit: ${DATA_GRID_MEM_LIMIT:-128m}
    cpus: "${DATA_GRID_CPUS:-0.20}"
    build:
      context: .
      dockerfile: apps/_2-Frontend/data-grid/Dockerfile
    ports:
      - "3012:80"

  dashboard:
    <<: *service-defaults
    mem_limit: ${DASHBOARD_MEM_LIMIT:-420m}
    cpus: "${DASHBOARD_CPUS:-0.50}"
    build:
      context: .
      dockerfile: apps/_2-Frontend/dashboard/Dockerfile
    env_file:
      - apps/_2-Frontend/dashboard/.env
    ports:
      - "3013:3013"
    environment:
      PORT_DASHBOARD: "3013"
      AUTH_SECRET: ${AUTH_SECRET:-change-me-please}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-please}

  acid-transaction-system:
    <<: *service-defaults
    mem_limit: ${ATS_MEM_LIMIT:-256m}
    cpus: "${ATS_CPUS:-0.30}"
    build:
      context: .
      dockerfile: apps/_1-Backend/acid-transaction-system/Dockerfile
    env_file:
      - apps/_1-Backend/acid-transaction-system/.env
    ports:
      - "3020:3020"
    environment:
      APP_HOST: "0.0.0.0"
      PORT_ACID_TRANSACTION_SYSTEM: "3020"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  query-optimization:
    <<: *service-defaults
    mem_limit: ${QO_MEM_LIMIT:-256m}
    cpus: "${QO_CPUS:-0.30}"
    build:
      context: .
      dockerfile: apps/_1-Backend/query-optimization/Dockerfile
    env_file:
      - apps/_1-Backend/query-optimization/.env
    ports:
      - "3021:3021"
    environment:
      APP_HOST: "0.0.0.0"
      PORT_QUERY_OPTIMIZATION: "3021"
    extra_hosts:
      - "host.docker.internal:host-gateway"
