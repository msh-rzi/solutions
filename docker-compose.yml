x-service-defaults: &service-defaults
  init: true
  restart: unless-stopped
  logging:
    driver: 'json-file'
    options:
      max-size: '10m'
      max-file: '3'

services:
  portfolio:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/portfolio/Dockerfile
    env_file:
      - apps/portfolio/.env
    networks:
      - web
    environment:
      PORT_PORTFOLIO: '3010'
      APP_LINK_PROTOCOL: 'https'
      APP_LINK_HOST: 'mehdify.com'
      PORT_FIELD_LEVEL_PERMISSION_FILTERS: '3011'
      PORT_DATA_GRID: '3012'
      PORT_DASHBOARD: '3013'
      PORT_ACID_TRANSACTION_SYSTEM: '3020'
      PORT_QUERY_OPTIMIZATION: '3021'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.portfolio.rule=Host(`mehdify.com`) || Host(`www.mehdify.com`)'
      - 'traefik.http.routers.portfolio.entrypoints=websecure'
      - 'traefik.http.routers.portfolio.tls.certresolver=myresolver'
      - 'traefik.http.services.portfolio.loadbalancer.server.port=3010'

  field-level-permission-filters:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/frontend/field-level-permission-filters/Dockerfile
    env_file:
      - apps/frontend/field-level-permission-filters/.env
    networks:
      - web
    environment:
      PORT_FIELD_LEVEL_PERMISSION_FILTERS: '3011'

  data-grid:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/frontend/data-grid/Dockerfile
    networks:
      - web

  dashboard:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/frontend/dashboard/Dockerfile
    env_file:
      - apps/frontend/dashboard/.env
    networks:
      - web
    environment:
      PORT_DASHBOARD: '3013'
      AUTH_SECRET: ${AUTH_SECRET:-change-me-please}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-please}

  acid-transaction-system:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/backend/acid-transaction-system/Dockerfile
    env_file:
      - apps/backend/acid-transaction-system/.env
    networks:
      - web
    environment:
      APP_HOST: '0.0.0.0'
      PORT_ACID_TRANSACTION_SYSTEM: '3020'
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  query-optimization:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/backend/query-optimization/Dockerfile
    env_file:
      - apps/backend/query-optimization/.env
    networks:
      - web
    environment:
      APP_HOST: '0.0.0.0'
      PORT_QUERY_OPTIMIZATION: '3021'
    extra_hosts:
      - 'host.docker.internal:host-gateway'

networks:
  web:
    external: true
